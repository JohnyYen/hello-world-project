# SDD Configuration - Hello World Project

schema: spec-driven

context: |
  Tech stack: Monorepo (pnpm workspaces) with 3 apps
  Frontend: Next.js 15 + React 19 + Tailwind 4 + shadcn/ui + Zod 4 + TypeScript 5
  Backend: FastAPI + SQLAlchemy 2.0 async + Alembic + PostgreSQL (Clean Architecture)
  Game: Godot 4.x + GDScript + SQLite
  Testing: TDD workflow (skill-based)
  Linting: ESLint + TypeScript strict

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
    - Document UI text must be in Spanish
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Frontend: Follow Server Components pattern, use cn() utility
    - Backend: Follow Clean Architecture (domain/application/infrastructure/api)
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Frontend: Use Server Actions for mutations, Zod for validation
    - Backend: Use dependency injection, async patterns
    - Never use useMemo/useCallback (React Compiler handles it)
    - Never use 'any' type - use unknown or generics
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
    - QA: UI text in Spanish, cn() used, Server Actions for mutations
  archive:
    - Warn before merging destructive deltas (large removals)
