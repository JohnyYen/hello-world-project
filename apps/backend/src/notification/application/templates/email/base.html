<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>{% block title %}Hello World{% endblock %}</title>
    <style type="text/css">
        /* Inline styles for email client compatibility */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: #333333;
        }
        table {
            border-collapse: collapse;
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        td, th {
            padding: 0;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .email-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 40px;
            text-align: center;
        }
        .email-header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .email-header p {
            color: rgba(255,255,255,0.9);
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        .email-body {
            padding: 30px 40px;
        }
        .email-footer {
            background-color: #f8f9fa;
            padding: 20px 40px;
            text-align: center;
            font-size: 12px;
            color: #888888;
            border-top: 1px solid #e9ecef;
        }
        .email-footer p {
            margin: 5px 0;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            margin: 20px 0;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .info-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e9ecef;
            font-size: 14px;
        }
        .info-table td:first-child {
            font-weight: 600;
            color: #666666;
            width: 40%;
        }
        .info-table td:last-child {
            color: #333333;
        }
        @media screen and (max-width: 600px) {
            .email-header { padding: 20px; }
            .email-body { padding: 20px; }
            .email-footer { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f4; padding: 20px 0;">
        <tr>
            <td align="center">
                <table class="email-container" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td class="email-header">
                            <h1>Hello World</h1>
                            <p>Plataforma Educativa Interactiva</p>
                        </td>
                    </tr>
                    <tr>
                        <td class="email-body">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td class="email-footer">
                            <p><strong>Hello World</strong> — Plataforma Educativa Interactiva</p>
                            <p>Este es un mensaje automático, por favor no respondas a este correo.</p>
                            <p>&copy; 2026 Hello World. Todos los derechos reservados.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
