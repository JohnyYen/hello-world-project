name: CI/CD Pipeline

on:
   push:
      branches: ['main']

env:
   NODE_VERSION: '18.x'

jobs:
   detect-changes:
      runs-on: ubuntu-latest
      outputs:
         frontend: ${{steps.filter.outputs.frontend}}
         backend: ${{steps.filter.outputs.backend}}
         game: ${{steps.filter.outputs.game}}
      steps:
         -  uses: actions/checkout@v4

         -  name: Verificar cambios en carpetas
            uses: dorny/paths-filter@v3
            id: filter
            with:
               filters: |
                  frontend:
                     - apps/frontend/**
                  backend:
                     - apps/backend/**
                  game:
                     - apps/game/**
   build-and-test:
      needs: detect-changes
      runs-on: ubuntu-latest

      strategy:
         matrix:
            app: [frontend, backend, game]

      if: ${{needs.detect-changes.outputs[matrix.app] == 'true'}}

      steps:
         -  uses: actions/checkout@v4
         
         -  name: Configurar Node.JS
            uses: actions/setup-node@v4
            with:
               node_version: ${{ env.NODE_VERSION }}
               cache: 'npm'

         -  name: Instalar dependencias
            run: npm ci

         # Tener en cuenta que las 3 apps, tienen frameworks distintos
         # -  name: Construir y Testear ${{matrix.app}}
         #    run: |
         #    echo "Construyendo la app: ${{matrix.app}}"
         #    cd

   deploy-frontend:
      needs: build-and-test
      if: needs.build-and-test.result == 'success' && needs.detects-changes.outputs.frontend == 'true';
      runs-on: ubuntu-latest
      steps:
         -  name: Desplegar Frontend
         -  run:  echo "Desplegando frontend en Vercel"

  deploy-backend:
      needs: build-and-test
      if: needs.build-and-test.result == 'success' && needs.detects-changes.outputs.backend == 'true';
      runs-on: ubuntu-latest
      steps:
         -  name: Desplegar Backend
         -  run:  echo "Desplegando Backend"

  deploy-game:
      needs: build-and-test
      if: needs.build-and-test.result == 'success' && needs.detects-changes.outputs.game == 'true';
      runs-on: ubuntu-latest
      steps:
         -  name: Desplegar Game
         -  run:  echo "Desplegando game"