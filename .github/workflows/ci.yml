name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      game: ${{ steps.filter.outputs.game }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes in app folders
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - apps/frontend/**
            backend:
              - apps/backend/**
            game:
              - apps/game/**

  frontend-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: apps/frontend
        continue-on-error: true
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type checking
        working-directory: apps/frontend
        continue-on-error: true
        run: pnpm run typecheck || echo "::warning::Type check failed"

      - name: Linting
        working-directory: apps/frontend
        continue-on-error: true
        run: pnpm run lint || echo "::warning::Lint check failed"

      - name: Security audit
        working-directory: apps/frontend
        continue-on-error: true
        run: pnpm audit --audit-level high || echo "::warning::Security audit found vulnerabilities"

      - name: Build verification
        working-directory: apps/frontend
        continue-on-error: true
        run: pnpm run build || echo "::warning::Frontend build failed"

      - name: Run tests with coverage
        working-directory: apps/frontend
        continue-on-error: true
        run: pnpm run test:coverage || echo "::warning::Frontend tests failed"

  backend-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
      SECRET_KEY: ci-test-secret-key-for-github-actions
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 3600

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: apps/backend
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --all-extras || uv sync

      - name: Type checking
        working-directory: apps/backend
        continue-on-error: true
        run: |
          source .venv/bin/activate
          mypy src || echo "::warning::Mypy check failed - type errors exist"

      - name: Linting
        working-directory: apps/backend
        continue-on-error: true
        run: |
          source .venv/bin/activate
          ruff check . || echo "::warning::Ruff check found issues"
          ruff format --check . || echo "::warning::Ruff format check failed"

      - name: Security audit
        working-directory: apps/backend
        continue-on-error: true
        run: |
          source .venv/bin/activate
          pip-audit || echo "::warning::Security audit found vulnerabilities"

      - name: Run tests with coverage
        working-directory: apps/backend
        continue-on-error: true
        run: |
          source .venv/bin/activate
          pytest --cov=src --cov-report=xml --cov-report=term || echo "::warning::Backend tests failed"

  game-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.game == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.4
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.4.0
          use-dotnet: false

      - name: Install required addons
        working-directory: apps/game
        run: |
          mkdir -p addons

          # Dialogue Manager
          if [ ! -d "addons/dialogue_manager" ]; then
            echo "Installing Dialogue Manager addon..."
            mkdir -p addons/dialogue_manager
            gh release download --repo nathanhoad/godot_dialogue_manager --pattern "*.zip" -O /tmp/dialogue_manager.zip 2>/dev/null || \
              curl -sL "https://github.com/nathanhoad/godot_dialogue_manager/releases/latest/download/addon.zip" -o /tmp/dialogue_manager.zip
            unzip -o /tmp/dialogue_manager.zip -d addons/dialogue_manager/ 2>/dev/null || true
          fi

          # GUT (Godot Unit Tests) - usually bundled, just ensure dir exists
          if [ ! -d "addons/gut" ]; then
            echo "GUT addon not found, tests will be skipped"
          fi

          # godot-sqlite
          if [ ! -d "addons/godot-sqlite" ]; then
            echo "Installing godot-sqlite addon..."
            mkdir -p addons/godot-sqlite
            curl -sL "https://github.com/2shady4u/godot-sqlite/releases/latest/download/GodotSqlite.zip" -o /tmp/godot_sqlite.zip 2>/dev/null || true
            if [ -f /tmp/godot_sqlite.zip ]; then
              unzip -o /tmp/godot_sqlite.zip -d addons/godot-sqlite/ 2>/dev/null || true
            fi
          fi

          echo "Addon directory:"
          ls -la addons/ 2>/dev/null || echo "No addons directory"

      - name: Generate project metadata (UIDs)
        working-directory: apps/game
        run: |
          godot --headless --editor --quit 2>&1 | tee /tmp/godot_editor.log || true
          echo "Editor initialization complete"

      - name: Validate project opens without errors
        working-directory: apps/game
        run: |
          godot --headless --quit 2>&1 | tee /tmp/godot_output.log || true
          # Check for critical SCRIPT errors (not asset/import warnings)
          if grep -qi "SCRIPT ERROR\|Parse Error\|Compile Error" /tmp/godot_output.log; then
            echo "::error::Godot project has script compilation errors"
            grep -i "SCRIPT ERROR\|Parse Error\|Compile Error" /tmp/godot_output.log
            exit 1
          fi
          echo "Project script compilation is valid"

      - name: Run GUT unit tests
        working-directory: apps/game
        continue-on-error: true
        run: |
          if [ -d "addons/gut" ]; then
            godot --headless -s addons/gut/gut_cmdline.gd -gexit 2>&1 | tee /tmp/gut_output.log || true
            if grep -qi "0 passed\|All tests failed" /tmp/gut_output.log; then
              echo "::warning::No GUT tests passed"
            fi
            cat /tmp/gut_output.log
          else
            echo "::warning::GUT addon not available, skipping tests"
          fi

      - name: Validate scene script references
        run: python .github/scripts/validate_scene_refs.py apps/game/
