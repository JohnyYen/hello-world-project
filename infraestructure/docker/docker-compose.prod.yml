services:
  postgresql_db:
    image: postgres:15
    container_name: hwp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: hwp-backend:latest
    container_name: hwp-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgresql_db:
        condition: service_healthy

  frontend:
    image: hwp-frontend:latest
    container_name: hwp-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  game:
    image: hwp-game:latest
    container_name: hwp-game
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  postgresql_data:
