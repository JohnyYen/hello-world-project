# Render Blueprint - Hello World Project
# Deploy frontend + backend con buildpacks (BD en Supabase)
# Incluye entornos de producción (main) y staging (develop)

services:
  # ==============================
  # BACKEND - PRODUCCIÓN (main)
  # ==============================
  - type: web
    name: hello-world-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/JohnyYen/hello-world-project
    autoDeploy: true
    buildCommand: pip install -r apps/backend/requirements.txt
    startCommand: cd apps/backend && PYTHONPATH=. uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALGORITHM
        value: "HS256"
      - key: ENVIRONMENT
        value: "production"
      - key: CORS_ORIGINS
        value: "https://hello-world-frontend-5pdk.onrender.com"

  # ==============================
  # FRONTEND - PRODUCCIÓN (main)
  # ==============================
  - type: web
    name: hello-world-frontend
    runtime: node
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/JohnyYen/hello-world-project
    autoDeploy: true
    buildCommand: cd apps/frontend && npm install && npm run build -- --no-lint
    startCommand: cd apps/frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: "https://hello-world-backend-r49b.onrender.com"

  # ==============================
  # BACKEND - STAGING (develop)
  # ==============================
  - type: web
    name: hello-world-backend-staging
    runtime: python
    plan: free
    region: oregon
    branch: develop
    repo: https://github.com/JohnyYen/hello-world-project
    autoDeploy: true
    buildCommand: pip install -r apps/backend/requirements.txt
    startCommand: cd apps/backend && PYTHONPATH=. uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALGORITHM
        value: "HS256"
      - key: ENVIRONMENT
        value: "staging"
      - key: CORS_ORIGINS
        value: "https://hello-world-frontend-staging.onrender.com"

  # ==============================
  # FRONTEND - STAGING (develop)
  # ==============================
  - type: web
    name: hello-world-frontend-staging
    runtime: node
    plan: free
    region: oregon
    branch: develop
    repo: https://github.com/JohnyYen/hello-world-project
    autoDeploy: true
    buildCommand: cd apps/frontend && npm install && npm run build -- --no-lint
    startCommand: cd apps/frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: "https://hello-world-backend-staging.onrender.com"