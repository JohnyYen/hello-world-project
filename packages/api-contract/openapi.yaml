openapi: 3.1.0
info:
  title: Hello World Backend
  description: Una API moderna y asíncrona para gestionar la plataforma de aprendizaje
    de programación con videjuegos
  contact:
    name: Johny A. Pedraza Romero
    url: http://tuwebsite.com/
    email: jhonnyantonio892@gmail.com
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login For Access Token
      description: 'Autentica un usuario y retorna el token de acceso JWT.


        - **username**: Username del usuario (opcional)

        - **email**: Email del usuario (opcional)

        - **password**: Contraseña del usuario


        Nota: Proporcionar username O email, no ambos requeridos.


        Retorna el token JWT y los datos del usuario autenticado.'
      operationId: login_for_access_token_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register User
      description: 'Registra un nuevo usuario y retorna el token de acceso JWT.


        - **username**: Nombre de usuario (debe ser único)

        - **email**: Email del usuario (debe ser único)

        - **name**: Nombre del usuario (requerido)

        - **lastname**: Apellido del usuario (opcional)

        - **password**: Contraseña del usuario (será hasheada)


        Retorna el token JWT y los datos del usuario creado.'
      operationId: register_user_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/change-password:
    post:
      tags:
      - Authentication
      summary: Change Password
      description: 'Cambia la contraseña de un usuario.


        - **user_id**: ID del usuario (en query parameter o body)

        - **current_password**: Contraseña actual para verificación

        - **new_password**: Nueva contraseña (mínimo 8 caracteres)'
      operationId: change_password_api_v1_auth_change_password_post
      parameters:
      - name: user_id
        in: query
        required: true
        schema:
          type: integer
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChangePassword'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/students:
    get:
      tags:
      - Users
      summary: List Students
      description: 'Listar estudiantes (con filtros y paginación).


        Requiere autenticación y rol de professor o admin.'
      operationId: list_students_api_v1_users_students_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Número de registros a saltar
          default: 0
          title: Skip
        description: Número de registros a saltar
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Número de registros a devolver
          default: 10
          title: Limit
        description: Número de registros a devolver
      - name: search
        in: query
        required: false
        schema:
          type: string
          description: Búsqueda por nombre o email
          title: Search
        description: Búsqueda por nombre o email
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Users
      summary: Create Student
      description: 'Registrar un nuevo estudiante.


        Requiere autenticación y rol de professor o admin.'
      operationId: create_student_api_v1_users_students_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/students/{id}:
    get:
      tags:
      - Users
      summary: Get Student
      description: 'Obtener detalle de un estudiante.


        Requiere autenticación. Professor/Admin pueden ver cualquier estudiante.

        El propio estudiante puede ver su propio perfil.'
      operationId: get_student_api_v1_users_students__id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Users
      summary: Update Student
      description: 'Actualizar información del estudiante.


        Requiere autenticación y rol de professor o admin.'
      operationId: update_student_api_v1_users_students__id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      summary: Delete Student
      description: 'Eliminar estudiante (soft delete).


        Requiere autenticación y rol de professor o admin.'
      operationId: delete_student_api_v1_users_students__id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/students/{id}/progress:
    get:
      tags:
      - Users
      summary: Get Student Progress
      description: 'Obtener progreso del estudiante.


        Requiere autenticación. Professor/Admin pueden ver cualquier estudiante.

        El propio estudiante puede ver su propio progreso.'
      operationId: get_student_progress_api_v1_users_students__id__progress_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProgressResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/students/{id}/reports:
    get:
      tags:
      - Users
      summary: Get Student Reports
      description: Obtener reportes individuales (desempeño, actividad, etc.)
      operationId: get_student_reports_api_v1_users_students__id__reports_get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentReportsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/:
    post:
      tags:
      - Users
      summary: Crear un nuevo usuario
      description: 'Crea un nuevo usuario en la base de datos con la información proporcionada.

        - **email**: El correo electrónico del usuario (debe ser único).

        - **username**: El nombre de usuario (opcional, debe ser único si se proporciona).

        - **name**: El nombre del usuario (requerido).

        - **password**: La contraseña del usuario.'
      operationId: create_user_api_v1_users__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Users
      summary: Obtener todos los usuarios
      description: "Obtiene una lista paginada de todos los usuarios registrados en\
        \ el sistema.\n\n- **include_deleted**: Si es True, incluye usuarios eliminados\
        \ (soft deleted).\n  Por defecto es False para solo mostrar usuarios activos."
      operationId: get_all_users_api_v1_users__get
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
          title: Limit
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Deleted
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/professors/me:
    get:
      tags:
      - Users
      summary: Get Teacher Profile
      description: 'Obtener perfil del profesor autenticado.


        Requiere autenticación mediante token JWT.'
      operationId: get_teacher_profile_api_v1_users_professors_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherProfileResponseSchema'
      security:
      - OAuth2PasswordBearer: []
    put:
      tags:
      - Users
      summary: Update Teacher Profile
      description: 'Actualizar perfil del profesor autenticado.


        Requiere autenticación mediante token JWT.'
      operationId: update_teacher_profile_api_v1_users_professors_me_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherProfileUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherUpdateResponseSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/users/professors/settings:
    get:
      tags:
      - Users
      summary: Get Teacher Settings
      description: 'Obtener configuraciones del dashboard del profesor.


        Requiere autenticación mediante token JWT.'
      operationId: get_teacher_settings_api_v1_users_professors_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherSettingsResponseSchema'
      security:
      - OAuth2PasswordBearer: []
    put:
      tags:
      - Users
      summary: Update Teacher Settings
      description: 'Actualizar configuraciones del dashboard del profesor.


        Requiere autenticación mediante token JWT.'
      operationId: update_teacher_settings_api_v1_users_professors_settings_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherSettingsUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherSettingsResponseSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/users/lms/credentials:
    post:
      tags:
      - Users
      - LMS Credentials
      summary: Register Lms Credentials
      description: 'Registrar credenciales LMS para un usuario.


        - **user_id**: ID del usuario que registra las credenciales

        - **lms_url**: URL del LMS (ej: https://moodle.university.edu)

        - **lms_email**: Email de la cuenta en el LMS

        - **lms_password**: Contraseña de la cuenta LMS

        - **lms_provider**: Proveedor LMS (moodle, canvas, etc.)'
      operationId: register_lms_credentials_api_v1_users_lms_credentials_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LMSCredentialCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LMSCredentialResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/lms/credentials/user/{user_id}:
    get:
      tags:
      - Users
      - LMS Credentials
      summary: Get User Lms Credentials
      description: 'Obtener las credenciales LMS de un usuario.


        Retorna las credenciales con la contraseña oculta.'
      operationId: get_user_lms_credentials_api_v1_users_lms_credentials_user__user_id__get
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LMSCredentialResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      - LMS Credentials
      summary: Delete User Lms Credentials
      description: 'Eliminar las credenciales LMS de un usuario.


        Realiza un soft delete de las credenciales.'
      operationId: delete_user_lms_credentials_api_v1_users_lms_credentials_user__user_id__delete
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/lms/sync/{user_id}:
    post:
      tags:
      - Users
      - LMS Integration
      summary: Sync Lms Data
      description: 'Sincronizar datos entre LMS y la plataforma.


        Importa usuarios, cursos y calificaciones desde el LMS

        o exporta progreso de estudiantes al LMS.'
      operationId: sync_lms_data_api_v1_users_lms_sync__user_id__post
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{user_id}:
    get:
      tags:
      - Users
      summary: Obtener un usuario por ID
      description: Busca y devuelve un usuario por su ID único.
      operationId: get_user_api_v1_users__user_id__get
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/games:
    get:
      tags:
      - Games
      summary: Get Games
      description: 'Lista todos los juegos con paginación.


        - **skip**: Número de registros a saltar (para paginación)

        - **limit**: Número máximo de registros a devolver (1-100)'
      operationId: get_games_api_v1_games_get
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Número de registros a saltar
          default: 0
          title: Skip
        description: Número de registros a saltar
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Número de registros a devolver
          default: 10
          title: Limit
        description: Número de registros a devolver
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Games
      summary: Create Game
      description: 'Crea un nuevo juego.


        - **title**: Título del juego (requerido)

        - **description**: Descripción del juego (opcional)

        - **creator**: Creador del juego (opcional)

        - **subject**: Materia/asignatura (opcional)

        - **publication_status**: Estado de publicación (opcional)'
      operationId: create_game_api_v1_games_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/games/{game_id}:
    get:
      tags:
      - Games
      summary: Get Game
      description: 'Obtiene los detalles de un juego específico.


        - **game_id**: ID del juego a obtener'
      operationId: get_game_api_v1_games__game_id__get
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: integer
          title: Game Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleGameResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Games
      summary: Update Game
      description: 'Actualiza un juego existente.


        - **game_id**: ID del juego a actualizar

        - **title**: Nuevo título (opcional)

        - **description**: Nueva descripción (opcional)

        - **creator**: Nuevo creador (opcional)

        - **subject**: Nueva materia (opcional)

        - **publication_status**: Nuevo estado (opcional)'
      operationId: update_game_api_v1_games__game_id__put
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: integer
          title: Game Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameUpdateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Games
      summary: Delete Game
      description: 'Elimina un juego (soft delete).


        - **game_id**: ID del juego a eliminar'
      operationId: delete_game_api_v1_games__game_id__delete
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: integer
          title: Game Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/game-instances/{game_id}/instances:
    post:
      tags:
      - Games
      summary: Create Game Instance
      description: 'Crea una nueva instancia de juego para un estudiante.


        - **game_id**: ID del juego

        - **student_id**: ID del estudiante (requerido)

        - **status**: Estado inicial (default: active)'
      operationId: create_game_instance_api_v1_game_instances__game_id__instances_post
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: integer
          title: Game Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameInstanceCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameInstanceCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Games
      summary: List Game Instances
      description: 'Lista las instancias de un juego con paginación.


        - **game_id**: ID del juego

        - **skip**: Número de registros a saltar

        - **limit**: Número máximo de registros a devolver

        - **status_filter**: Filtrar por estado (opcional)'
      operationId: list_game_instances_api_v1_game_instances__game_id__instances_get
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: integer
          title: Game Id
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Número de registros a saltar
          default: 0
          title: Skip
        description: Número de registros a saltar
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Número de registros a devolver
          default: 10
          title: Limit
        description: Número de registros a devolver
      - name: status_filter
        in: query
        required: false
