  /api/v1/statistic/xapi/statements:
    post:
      tags:
      - Statistics
      - xAPI
      summary: Send Statements
      description: 'Receive and store xAPI statements.


        Accepts a batch of xAPI statements (1-1000 per request).

        Supports full xAPI 1.0 specification with game-specific context.


        The game client should send statements with:

        - actor.account.name = student_id

        - verb = standard xAPI verb

        - object.id = activity ID (e.g., hello-world://segment/level_1_seg_3)

        - result = quantitative data (score, success, completion)

        - context = qualitative data (platform, language, extensions)

        - context.extensions = game-specific data (game_id, level_id, segment_id)'
      operationId: send_statements_api_v1_statistic_xapi_statements_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/XAPIStatementBatchCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/XAPIStatementResponse'
                title: Response Send Statements Api V1 Statistic Xapi Statements Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Statistics
      - xAPI
      summary: Get Statements
      description: 'Get xAPI statements with optional filters.


        Returns statements with pagination. Use filters to narrow results.'
      operationId: get_statements_api_v1_statistic_xapi_statements_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of records to skip
          default: 0
          title: Skip
        description: Number of records to skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Maximum number of records to return
          default: 100
          title: Limit
        description: Maximum number of records to return
      - name: student_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter by student ID
          title: Student Id
        description: Filter by student ID
      - name: verb_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by verb ID
          title: Verb Id
        description: Filter by verb ID
      - name: game_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter by game ID
          title: Game Id
        description: Filter by game ID
      - name: level_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter by level ID
          title: Level Id
        description: Filter by level ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XAPIStatementListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
