          title: Stored
          type: string
        timestamp:
          format: date-time
          title: Timestamp
          type: string
        verb:
          $ref: '#/components/schemas/XAPIVerb'
      required:
      - id
      - actor
      - verb
      - object
      - timestamp
      - stored
      title: XAPIStatementResponse
      type: object
    XAPIVerb:
