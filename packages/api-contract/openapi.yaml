      operationId: get_statements_api_v1_statistic_xapi_statements_get
      parameters:
      - description: Number of records to skip
        in: query
        name: skip
        required: false
        schema:
          default: 0
          description: Number of records to skip
          minimum: 0
          title: Skip
          type: integer
      - description: Maximum number of records to return
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Maximum number of records to return
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
      - description: Filter by student ID
        in: query
        name: student_id
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter by student ID
          title: Student Id
      - description: Filter by verb ID
        in: query
        name: verb_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by verb ID
          title: Verb Id
      - description: Filter by game ID
        in: query
        name: game_id
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter by game ID
          title: Game Id
      - description: Filter by level ID
        in: query
        name: level_id
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter by level ID
          title: Level Id
      responses:
        '200':
