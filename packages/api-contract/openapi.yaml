          description: Raw score
          title: Raw
        scaled:
          anyOf:
          - type: number
          - type: 'null'
          description: Scaled score (0-1)
          title: Scaled
      title: XAPIScore
      type: object
    XAPIStatementBatchCreate:
      description: Batch of xAPI statements.
      properties:
        statements:
          items:
            $ref: '#/components/schemas/XAPIStatementCreate'
          maxItems: 1000
          minItems: 1
          title: Statements
          type: array
      required:
      - statements
      title: XAPIStatementBatchCreate
      type: object
    XAPIStatementCreate:
      description: 'xAPI Statement schema for receiving statements from game client.

        Supports full xAPI 1.0 specification with game-specific context.'
      example:
        actor:
          account:
            homePage: hello-world-game
            name: student_123
        context:
          extensions:
            http://hello-world-game.com/extensions/attempts: 2
            http://hello-world-game.com/extensions/game_session: session_abc
            http://hello-world-game.com/extensions/hints_used: 1
          language: es
          platform: Hello World Game v1.0
        object:
          definition:
            name:
              es: Segmento 3 - Variables
            type: http://adlnet.gov/expapi/activities/lesson
          id: hello-world://segment/level_1_seg_3
        result:
          completion: true
          duration: PT5M30S
          score:
            max: 100
            min: 0
            raw: 85
            scaled: 0.85
          success: true
        timestamp: '2026-02-13T10:30:00Z'
        verb:
          id: http://adlnet.gov/expapi/verbs/completed
      properties:
        actor:
          $ref: '#/components/schemas/XAPIActor'
          description: Who performed the action
        attachments:
          anyOf:
          - items:
              type: object
            type: array
          - type: 'null'
          description: Attachments
          title: Attachments
        authority:
          anyOf:
          - $ref: '#/components/schemas/XAPIActor'
          - type: 'null'
          description: Who stored the statement
        context:
          anyOf:
          - $ref: '#/components/schemas/XAPIContext-Input'
          - type: 'null'
          description: Context (qualitative info)
        id:
          anyOf:
          - type: string
          - type: 'null'
          description: Statement ID (UUID), auto-generated if not provided
          title: Id
        object:
          $ref: '#/components/schemas/XAPIActivity'
          description: The object of the action
        result:
          anyOf:
          - $ref: '#/components/schemas/XAPIResult'
          - type: 'null'
          description: Result of the action (quantitative)
        stored:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: When the statement was stored
          title: Stored
        timestamp:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: When the statement occurred
          title: Timestamp
        verb:
          $ref: '#/components/schemas/XAPIVerb'
          description: The action performed
        version:
          anyOf:
          - type: string
          - type: 'null'
          description: 'xAPI version (default: 1.0.3)'
          title: Version
      required:
      - actor
      - verb
      - object
      title: XAPIStatementCreate
      type: object
    XAPIStatementListResponse:
      description: List of xAPI statements with pagination.
      properties:
        limit:
          title: Limit
          type: integer
        skip:
          title: Skip
          type: integer
        statements:
          items:
            $ref: '#/components/schemas/XAPIStatementResponse'
          title: Statements
          type: array
        total:
          title: Total
          type: integer
      required:
      - statements
      - total
      - skip
      - limit
      title: XAPIStatementListResponse
      type: object
    XAPIStatementResponse:
